<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHUFFLER LOG - Multi-System Sync</title>
    <style>
        /* --- LIGHT BLUE THEME (PURE BLACK FONT) --- */
        :root {
            --bg-body-grey: #F0F9FF; 
            --bg-form-grey: #FFFFFF; 
            --input-grey: #FFFFFF; 
            --primary-slate: #7DD3FC; 
            --accent-charcoal: #000000; 
            --text-dark: #000000; 
            --text-muted: #000000; 
            --border-grey: #BAE6FD; 
            --border-focus: #38BDF8; 
            
            --success: #4ADE80; 
            --warning: #FACC15; 
            --danger: #F87171; 
            --action-blue: #38BDF8; 
            
            --alert-brown-professional: #000000; 
            --alert-teal-professional: #000000; 
        }

        body { font-family: 'Inter', '-apple-system', 'Segoe UI', Arial, sans-serif; padding: 20px; background: var(--bg-body-grey); text-transform: uppercase; color: #000000; font-weight: 600; letter-spacing: 0.2px; }
        .container { max-width: 1400px; margin: auto; background: var(--bg-form-grey); padding-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.1), 0 2px 4px -1px rgba(2, 132, 199, 0.06); position: relative; overflow: hidden; border: 1px solid var(--border-grey); }
        .header { background-color: var(--primary-slate); width: 100%; padding: 22px 0; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #0284C7; }
        .header h3 { margin: 0; font-size: 1.82rem; letter-spacing: 2px; font-weight: 900; color: #000000; }
        
        .top-issues-container { position: absolute; top: 22px; left: 25px; text-align: left; font-weight: 800; font-size: 0.9rem; color: #000000; white-space: nowrap; }
        .total-badge-container { position: absolute; top: 22px; right: 25px; text-align: right; font-weight: 800; font-size: 0.9rem; color: #000000; white-space: nowrap; }
        
        .form-content { padding: 0 25px; }
        .form-section { background: var(--bg-form-grey); padding: 24px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-grey); box-shadow: 0 1px 2px rgba(2,132,199,0.05); }
        .input-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 120px; }
        label { font-weight: 800; display: block; margin-bottom: 6px; font-size: 0.75rem; color: #000000; letter-spacing: 0.5px; } 
        input, select { width: 100%; padding: 10px 12px; border: 1px solid var(--border-grey); border-radius: 6px; box-sizing: border-box; font-size: 0.85rem; text-transform: uppercase; background: var(--input-grey); color: #000000; font-weight: 700; transition: all 0.2s ease; box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02); }
        input:focus, select:focus { outline: none; border-color: var(--border-focus); background: #fff; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        .action-bar { display: flex; gap: 12px; margin-top: 25px; padding: 16px; background: #F0F9FF; border-radius: 6px; border: 1px solid var(--border-grey); flex-wrap: wrap; }
        .btn { padding: 10px 16px; border: 1px solid #000000; border-radius: 6px; cursor: pointer; font-weight: 800; color: #000000; font-size: 0.8rem; flex: 1; text-transform: uppercase; min-width: 120px; transition: opacity 0.2s; letter-spacing: 0.5px; }
        .btn:hover:not(:disabled) { opacity: 0.8; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; border: 1px solid var(--border-grey); }
        .btn-save { background: var(--success); }
        .btn-update { background: var(--warning); }
        .btn-delete { background: var(--danger); }
        .btn-clear { background: #E2E8F0; } 
        .btn-excel { background: var(--action-blue); } 
        .btn-reset { background: white; color: #000000; } 
        .search-container { margin: 15px 0; display: flex; align-items: center; background: var(--bg-form-grey); padding: 12px; border-radius: 6px; border: 1px solid var(--border-grey); flex-wrap: wrap; gap: 10px; box-shadow: 0 1px 2px rgba(2,132,199,0.05); }
        .search-wrapper { position: relative; flex: 2; }
        .dropdown-list { display: none; position: absolute; z-index: 100; background: white; width: 100%; max-height: 180px; overflow-y: auto; border: 2px solid #000000; border-radius: 6px; top: 100%; box-shadow: 0 4px 6px -1px rgba(2,132,199,0.1); }
        .dropdown-list option { padding: 8px 12px; cursor: pointer; color: #000000; font-weight: 700; }
        .dropdown-list option:hover { background-color: #E0F2FE; color: #000000; }
        .table-wrapper { max-height: 450px; overflow-y: auto; border: 1px solid var(--border-grey); border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; cursor: pointer; background: white; }
        th, td { border-bottom: 1px solid var(--border-grey); padding: 14px 16px; text-align: center; font-size: 0.8rem; color: #000000; }
        td { font-weight: 600; }
        th { background: #E0F2FE; color: #000000; position: sticky; top: 0; z-index: 10; font-weight: 800; letter-spacing: 0.5px; border-bottom: 2px solid #000000; }
        tr:nth-child(even) { background: #FFFFFF; }
        tr:nth-child(odd) { background: #F8FAFC; }
        tr:hover { background: #BAE6FD; }
        .selected-row { background: #7DD3FC !important; outline: 2px solid #000000; }
        .card-damage-row td { color: #000000 !important; font-weight: 800; background-color: #FEE2E2; }
        .dept-row td { color: #000000 !important; font-weight: 800; background-color: #FFEDD5; } 
        .swap-row td { color: #000000 !important; font-weight: 800; background-color: #CCFBF1; } 
        .expired-row { color: #000000 !important; font-style: italic; font-weight: 500; opacity: 0.6; }
        #syncStatus { font-size: 0.65rem; color: #000000; position: absolute; bottom: 8px; right: 12px; font-weight: 800; }
    </style>
</head>
<body onclick="checkClickOutside(event)" onload="initApp()">

<div class="container" id="mainContainer">
    <div class="top-issues-container" id="topAssets">FETCHING DATA...</div>
    <div class="total-badge-container" id="totalCount">TOTAL RECORDS: 0</div>
    <div class="header"><h3>SHUFFLER LOG SYSTEM</h3></div>

    <div class="form-content">
        <div class="form-section">
            <div class="input-row">
                <div class="input-group"><label>LOG DATE</label><input type="date" id="date" tabindex="1"></div>
                <div class="input-group"><label>LOG TIME</label><input type="time" id="time" tabindex="2"></div>
                <div class="input-group"><label>REPORTED BY</label><input type="text" id="informedBy" tabindex="3"></div>
                <div class="input-group"><label>TABLE NO</label><input type="text" id="tableNo" oninput="enforcePrefix('tableNo', 'FT ')" tabindex="4"></div>
                <div class="input-group">
                    <label>SHUFFLER TYPE</label>
                    <select id="shuffler" onchange="handleShufflerChange()" tabindex="5">
                        <option value="">SELECT MODEL</option>
                        <option value="DECKMATE">DECKMATE</option>
                        <option value="MFS">MFS</option>
                        <option value="SK-2">SK-2</option>
                        <option value="IDEAL">IDEAL</option>
                        <option value="APLUS">APLUS</option>
                        <option value="MD">MD</option>
                    </select>
                </div>
                <div class="input-group"><label>ASSET NUMBER</label><input type="text" id="assetNo" oninput="enforceAssetPrefix()" tabindex="6"></div>
            </div>

            <div class="input-row">
                <div class="search-wrapper">
                    <label>ERROR MESSAGE</label>
                    <input type="text" id="error" autocomplete="off" onfocus="showList('errorSelect')" onkeyup="filterList('error', 'errorSelect')" onblur="setTimeout(() => document.getElementById('errorSelect').style.display='none', 150)" tabindex="7">
                    <select id="errorSelect" class="dropdown-list" size="5" tabindex="-1"></select>
                </div>
                <div class="input-group"><label>SURVEILLANCE</label><input type="text" id="surveillance" tabindex="8"></div>
                <div class="search-wrapper">
                    <label>TECHNICIAN</label>
                    <input type="text" id="tech" autocomplete="off" onfocus="showList('techSelect')" onkeyup="filterList('tech', 'techSelect')" onblur="setTimeout(() => document.getElementById('techSelect').style.display='none', 150)" tabindex="9">
                    <select id="techSelect" class="dropdown-list" size="5" tabindex="-1"></select>
                </div>
                <div class="input-group" style="flex:2;">
                    <label id="remarksLabel">REMARKS (MANDATORY FOR SWAPS/DEPT)</label>
                    <input type="text" id="remarks" placeholder="ENTER DETAILS HERE..." tabindex="10">
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-save" id="btnSave" onclick="saveData()" tabindex="11">SAVE NEW RECORD</button>
                <button class="btn btn-update" id="btnUpdate" onclick="updateData()" disabled>UPDATE SELECTED</button>
                <button class="btn btn-delete" id="btnDelete" onclick="deleteData()" disabled>DELETE</button>
                <button class="btn btn-clear" onclick="deselect()">CLEAR FORM</button>
                <button class="btn btn-excel" onclick="exportExcel()">EXPORT EXCEL</button>
                <button class="btn btn-reset" onclick="hardReset()">SYSTEM RESET</button>
                <button class="btn" style="background: var(--action-blue);" onclick="syncFromServer(true)">SYNC NOW</button>
            </div>
        </div>

        <div class="search-container">
            <div style="display: flex; align-items: center; background: #E0F2FE; padding: 6px 12px; border-radius: 6px; border: 1px solid #000000;">
                <span style="font-weight:800; font-size: 0.8rem; color: #000000; margin-right: 10px;">VIEW MONTH:</span>
                <select id="monthSelector" onchange="changeMonth()" style="width: auto; padding: 4px; border: none; background: transparent; cursor: pointer; color: #000000; font-weight: 800; outline: none;"></select>
            </div>
            <input type="text" id="tableSearch" placeholder="SEARCH TABLE, MODEL, TECH, ASSET..." onkeyup="searchTable()" style="flex:1; margin-left:15px; border: 1px solid #000000;">
        </div>

        <div class="table-wrapper">
            <table id="dataTable">
                <thead><tr><th>SR.</th><th>DATE</th><th>TIME</th><th>INFORMED</th><th>TABLE</th><th>MODEL</th><th>ASSET</th><th>ERROR</th><th>SURV.</th><th>TECH</th><th>REMARKS</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <div id="syncStatus">CONNECTED TO MASTER CLOUD</div>
</div>

<script>
    // MAKE SURE TO PASTE YOUR GOOGLE SCRIPT URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7Rdu-pi5oUD25PNlHr5O0XfIx6bM8YBur6VOPC4BlXEPOIHQwun9m5OUmsApO-ixg/exec"; 
    
    // REARRANGED FIELD ORDER
    const fields = ["date", "time", "informedBy", "tableNo", "shuffler", "assetNo", "error", "surveillance", "tech", "remarks"];
    
    const LIMIT_MINUTES = 10;
    const SPECIAL_ERRORS = ["SHUFFLER BROUGHT TO DEPARTMENT", "SHUFFLER SWAPPED WITH OTHER TABLE"];

    const errorData = {
        "DECKMATE": ["REMOVE FEEDER CARDS", "PERFORMING AUTO SETUP", "CARD JAM ERROR", "MISSING 1 CARD", "TOO MANY CARDS", "CARD DAMAGE", ...SPECIAL_ERRORS],
        "MFS": ["REMOVE CARD FROM SHELF", "OPEN CLOSE COVER", "CLOSE COVER", "WHEEL NOT LOCKED", "CARD DAMAGE", ...SPECIAL_ERRORS],
        "SK-2": ["CARDS BLOCKED", "DOOR SENSOR COVERED", "ESD SHOCK ERROR", "TOO FEW CARDS ERROR", "CARD DAMAGE", ...SPECIAL_ERRORS],
        "IDEAL": ["CARD JAM", "SENSOR ERROR", "ROLLER CLEANING REQUIRED", "CARD DAMAGE", ...SPECIAL_ERRORS],
        "APLUS": ["GRIPPER ERROR", "ELEVATOR JAM", "DECK EMPTY", "CARD DAMAGE", ...SPECIAL_ERRORS],
        "MD": ["SHUFFLE TIMEOUT", "INTERNAL ERROR", "CALIBRATION ERROR", "CARD DAMAGE", ...SPECIAL_ERRORS]
    };
    
    const techNames = ["ARJUN KUMAR", "ARPAN KHATI", "ASHVIK PADLOSKAR", "JITIN KUMAR", "JOEL FURTADO", "JULIUS MIRANDA", "MOHEET GHADI", "MORRISON ALMEIDA", "OMKAR KAULGEKAR", "ROHAN DALAL", "ROHAN PATIL", "SARVANG NAIK", "ASIF HAIDER", "SULEMAN MAKANDAR", "SUSOVON DEBHNATH", "VIVEK MURGAOKAR", "XAVIER FERNANDES", "YOGESH CHAWAN", "SARTHAK KANASKAR", "PRABHU N", "RINKU GIRI", "SAJARO SALGAOKAR"];
    
    let selectedRow = null;
    let currentViewMonth = "";
    let localVersion = "0";
    
    let lockedDate = "";
    let lockedTime = "";

    async function initApp() { 
        loadFromStorage(); 
        initTechList(); 
        
        const n = new Date();
        lockedDate = n.toISOString().split('T')[0];
        lockedTime = n.toTimeString().slice(0,5);
        document.getElementById('date').value = lockedDate;
        document.getElementById('time').value = lockedTime;
        
        resetPrefixes(); 
        await syncFromServer(true); 
        setInterval(() => syncFromServer(false), 2000); 
    }

    function changeMonth() {
        currentViewMonth = document.getElementById('monthSelector').value;
        syncFromServer(true); 
    }

    async function syncFromServer(force = false) {
        if(!SCRIPT_URL.startsWith("https")) return;
        let fetchUrl = SCRIPT_URL + "?version=" + localVersion;
        if (currentViewMonth !== "") fetchUrl += "&month=" + encodeURIComponent(currentViewMonth);
        if (force) {
            fetchUrl += "&force=true";
            document.getElementById('syncStatus').innerText = "FORCING DATA SYNC...";
        } else {
            document.getElementById('syncStatus').innerText = "CHECKING FOR UPDATES...";
        }

        try {
            const response = await fetch(fetchUrl);
            const data = await response.json(); 
            if (data.changed === false) {
                document.getElementById('syncStatus').innerText = "NO NEW UPDATES: " + new Date().toLocaleTimeString();
                return;
            }
            if (data && data.records) {
                localVersion = data.version; 
                updateMonthDropdown(data.months, data.currentView);
                renderTable(data.records);
                localStorage.setItem('shufflerLogsAssetV2', JSON.stringify(data.records));
                document.getElementById('syncStatus').innerText = "DATA UPDATED: " + new Date().toLocaleTimeString();
            }
        } catch (e) { document.getElementById('syncStatus').innerText = "OFFLINE MODE - RETRYING SOON..."; }
    }

    function updateMonthDropdown(months, currentView) {
        const sel = document.getElementById('monthSelector');
        if (sel.options.length !== months.length) {
            sel.innerHTML = "";
            months.forEach(m => {
                let opt = document.createElement('option'); opt.value = opt.text = m;
                if (m === currentView) opt.selected = true;
                sel.appendChild(opt);
            });
        }
    }

    function renderTable(dataList) {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = "";

        dataList.sort((a, b) => {
            let strA = (a.date || "") + "T" + (a.time || "");
            let strB = (b.date || "") + "T" + (b.time || "");
            return strB.localeCompare(strA); 
        });

        dataList.forEach((item, index) => {
            const row = tbody.insertRow();
            row.setAttribute("data-id", item.id);
            row.insertCell(0).innerText = index + 1;
            fields.forEach((f, i) => row.insertCell(i + 1).innerText = item[f] || "");
            
            if (item.error === "CARD DAMAGE") row.classList.add('card-damage-row');
            else if (item.error === "SHUFFLER BROUGHT TO DEPARTMENT") row.classList.add('dept-row');
            else if (item.error === "SHUFFLER SWAPPED WITH OTHER TABLE") row.classList.add('swap-row');
            if (checkExpiry(item.id)) row.classList.add('expired-row');
        });
        refreshTable();
    }

    function saveData() {
        const errorVal = document.getElementById('error').value.toUpperCase();
        const remarksVal = document.getElementById('remarks').value.trim();

        if (document.getElementById('tableNo').value === "FT " || document.getElementById('assetNo').value === getAssetPrefix()) { 
            alert("INCOMPLETE DATA: PLEASE ENTER TABLE AND ASSET NO."); return; 
        }
        if (SPECIAL_ERRORS.includes(errorVal) && remarksVal === "") {
            document.getElementById('remarks').style.borderColor = "var(--danger)";
            document.getElementById('remarks').focus();
            alert("REMARKS ARE COMPULSORY FOR: " + errorVal); return;
        }
        for (let id of fields) { 
            if (id !== 'remarks' && document.getElementById(id).value.trim() === "") { alert("ALL FIELDS REQUIRED"); return; } 
        }
        
        lockedDate = document.getElementById('date').value;
        lockedTime = document.getElementById('time').value;
        
        const rowID = "ID-" + Date.now();
        let dataObj = { id: rowID, action: "SAVE" };
        fields.forEach(id => dataObj[id] = document.getElementById(id).value.toUpperCase());

        syncToSheet(dataObj);
        deselect();
    }

    function updateData() {
        if (!selectedRow) return;
        lockedDate = document.getElementById('date').value;
        lockedTime = document.getElementById('time').value;

        const rowID = selectedRow.getAttribute("data-id");
        let dataObj = { id: rowID, action: "UPDATE" };
        fields.forEach(id => dataObj[id] = document.getElementById(id).value.toUpperCase());
        syncToSheet(dataObj);
        deselect();
    }

    function deleteData() {
        if (!selectedRow) return;
        if (confirm("ARE YOU SURE YOU WANT TO DELETE THIS LOG? THIS WILL REMOVE IT FROM ALL COMPUTERS.")) {
            const rowID = selectedRow.getAttribute("data-id");
            let dataObj = { id: rowID, action: "DELETE" };
            fields.forEach(id => dataObj[id] = document.getElementById(id).value.toUpperCase());

            let stored = JSON.parse(localStorage.getItem('shufflerLogsAssetV2') || "[]");
            stored = stored.filter(item => item.id !== rowID);
            localStorage.setItem('shufflerLogsAssetV2', JSON.stringify(stored));
            renderTable(stored);

            syncToSheet(dataObj);
            deselect();
        }
    }

    async function syncToSheet(data) {
        if(!SCRIPT_URL.startsWith("https")) return;
        document.getElementById('syncStatus').innerText = "SAVING TO MASTER CLOUD...";
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
            .then(() => setTimeout(() => syncFromServer(true), 1000));
    }

    function checkExpiry(rowID) { return (Date.now() - parseInt(rowID.split('-')[1])) / (1000 * 60) > LIMIT_MINUTES; }
    
    function loadFromStorage() {
        const stored = localStorage.getItem('shufflerLogsAssetV2');
        if (stored) renderTable(JSON.parse(stored));
    }

    function refreshTable() {
        const rows = document.querySelectorAll('#dataTable tbody tr');
        const counts = {};
        rows.forEach((r) => {
            // Asset is now in cell index 6
            const asset = r.cells[6].innerText.trim();
            if(asset && !asset.endsWith("- ")) counts[asset] = (counts[asset] || 0) + 1;
        });
        
        document.getElementById('totalCount').innerHTML = `TOTAL RECORDS: <span style="color: red;">${rows.length}</span>`;

        const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);
        let htmlParts = [];
        top.forEach(([a, c]) => { htmlParts.push(`${a}: <span style="color: red;">${c}</span>`); });
        
        if (htmlParts.length > 0) document.getElementById('topAssets').innerHTML = htmlParts.join(' &nbsp;&nbsp;|&nbsp;&nbsp; ');
        else document.getElementById('topAssets').innerHTML = "NO DATA";
    }

    function handleShufflerChange() { loadErrorList(); enforceAssetPrefix(); }
    function getAssetPrefix() {
        const s = document.getElementById('shuffler').value;
        const p = {"DECKMATE":"SHFL-DM- ", "MFS":"SHFL-MFS- ", "SK-2":"SHFL-SK2- ", "IDEAL":"SHFL-ID- ", "APLUS":"SHFL-AP- ", "MD":"SHFL-MD- "};
        return p[s] || "SHFL- ";
    }
    function enforcePrefix(id, prefix) { 
        const input = document.getElementById(id); 
        if (!input.value.startsWith(prefix)) input.value = prefix; 
    }
    function enforceAssetPrefix() { enforcePrefix('assetNo', getAssetPrefix()); }
    function resetPrefixes() { 
        document.getElementById('tableNo').value = "FT "; 
        document.getElementById('assetNo').value = getAssetPrefix(); 
    }
    
    function initTechList() {
        const sel = document.getElementById('techSelect');
        techNames.sort().forEach(name => { 
            let opt = document.createElement('option'); 
            opt.value = opt.text = name; 
            opt.onmousedown = function(e) { e.preventDefault(); document.getElementById('tech').value = this.value; sel.style.display = "none"; };
            sel.appendChild(opt); 
        });
    }

    function loadErrorList() {
        const sel = document.getElementById('errorSelect'); 
        const shuff = document.getElementById('shuffler').value;
        sel.innerHTML = ""; 
        if(errorData[shuff]) { 
            errorData[shuff].forEach(err => { 
                let opt = document.createElement('option'); 
                opt.value = opt.text = err; 
                opt.onmousedown = function(e) {
                    e.preventDefault(); document.getElementById('error').value = this.value; sel.style.display = "none";
                    const isSpecial = SPECIAL_ERRORS.includes(this.value);
                    document.getElementById('remarks').style.background = isSpecial ? "#FEF2F2" : "var(--input-grey)";
                };
                sel.appendChild(opt); 
            }); 
            sel.style.display = "block"; 
        }
    }

    function showList(id) { document.getElementById(id).style.display = "block"; }

    function filterList(inputId, selectId) {
        const f = document.getElementById(inputId).value.toUpperCase();
        const opts = document.getElementById(selectId).options;
        let v = 0;
        for (let o of opts) { let m = o.text.includes(f); o.style.display = m ? "" : "none"; if(m) v++; }
        document.getElementById(selectId).style.display = v > 0 ? "block" : "none";
    }

    function searchTable() {
        const input = document.getElementById("tableSearch").value.toUpperCase();
        const rows = document.querySelector("#dataTable tbody").rows;
        for (let row of rows) row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
    }

    function deselect() { 
        if(selectedRow) selectedRow.classList.remove('selected-row'); 
        selectedRow = null; 
        document.getElementById('btnSave').disabled = false; 
        document.getElementById('btnUpdate').disabled = true;
        document.getElementById('btnDelete').disabled = true; 
        
        clearInputs(); resetPrefixes(); 
        
        document.getElementById('date').value = lockedDate;
        document.getElementById('time').value = lockedTime;
        
        document.getElementById('remarks').style.borderColor = "var(--border-grey)";
        document.getElementById('remarks').style.background = "var(--input-grey)";
    }

    function clearInputs() { ["informedBy", "tableNo", "error", "assetNo", "tech", "shuffler", "surveillance", "remarks"].forEach(id => document.getElementById(id).value = ""); }

    function exportExcel() {
        let csv = []; 
        let rows = document.querySelectorAll("#dataTable tr");
        
        for (let i = 0; i < rows.length; i++) {
            if (rows[i].style.display !== "none") {
                let row = []; 
                let cols = rows[i].querySelectorAll("th, td");
                for (let j = 0; j < cols.length; j++) {
                    let cleanText = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " ").replace(/"/g, '""');
                    row.push('"' + cleanText + '"');
                }
                csv.push(row.join(",")); 
            }
        }
        
        let csvString = csv.join("\r\n");
        let finalCsvContent = "\uFEFF" + csvString;
        let blob = new Blob([finalCsvContent], { type: 'text/csv;charset=utf-8;' });
        
        let monthName = document.getElementById('monthSelector').value || "EXPORT";
        let filename = "SHUFFLER_LOG_" + monthName + ".csv";

        let link = document.createElement("a");
        let url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        setTimeout(function() { URL.revokeObjectURL(url); }, 500);
    }
    
    function hardReset() {
        const pass = window.prompt("ENTER MASTER PASSCODE TO WIPE SYSTEM DATA:");
        if (!pass) return;

        document.getElementById('syncStatus').innerText = "VERIFYING PASSCODE...";
        const dataObj = { action: "RESET", passcode: pass };
        
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(dataObj) })
            .then(() => setTimeout(() => { localStorage.removeItem('shufflerLogsAssetV2'); location.reload(); }, 1500));
    }

    document.querySelector('#dataTable tbody').addEventListener('click', e => {
        const row = e.target.closest('tr'); 
        if(!row) return; 
        if(selectedRow) selectedRow.classList.remove('selected-row');
        selectedRow = row; selectedRow.classList.add('selected-row'); 
        document.getElementById('btnSave').disabled = true;
        document.getElementById('btnUpdate').disabled = false;
        document.getElementById('btnDelete').disabled = false; 
        
        fields.forEach((id, i) => {
            let val = row.cells[i+1].innerText.trim();
            if (id === 'time' && val.length === 4 && val.includes(':')) val = "0" + val;
            document.getElementById(id).value = val;
        });
        e.stopPropagation();
    });

    function checkClickOutside(e) {
        if (!e.target.closest('#dataTable') && !e.target.closest('.form-section')) deselect(); 
        if (!e.target.closest('.search-wrapper')) document.querySelectorAll('.dropdown-list').forEach(el => el.style.display = "none"); 
    }
</script>
</body>
</html>
